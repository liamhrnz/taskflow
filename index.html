<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TaskFlow — Personal Task Manager</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <header>
        <h1>TaskFlow</h1>
        <p>Organize, track, and complete your tasks efficiently.</p>
    </header>

    <main>
        <section aria-label="Add task">
            <h2>Add a New Task</h2>
            <form id="task-form">
                <fieldset>
                    <legend>Task Details</legend>

                    <label for="title">Title <span aria-label="required">*</span></label>
                    <input 
                        type="text" 
                        id="title" 
                        name="title" 
                        placeholder="Enter task title" 
                        required
                    >

                    <label for="description">Description</label>
                    <textarea 
                        id="description" 
                        name="description" 
                        placeholder="Enter task details (optional)"
                        rows="4"
                    ></textarea>

                    <label for="priority">Priority</label>
                    <select id="priority" name="priority">
                        <option value="low">Low</option>
                        <option value="medium" selected>Medium</option>
                        <option value="high">High</option>
                    </select>

                    <label for="status">Status</label>
                    <select id="status" name="status">
                        <option value="pending" selected>Pending</option>
                        <option value="in-progress">In Progress</option>
                        <option value="done">Done</option>
                    </select>

                    <label for="dueDate">Due Date</label>
                    <input 
                        type="date" 
                        id="dueDate" 
                        name="dueDate"
                    >
                </fieldset>

                <button type="submit">Add Task</button>
            </form>
        </section>

        <section aria-label="Task list">
            <h2>Your Tasks</h2>
            <ul id="task-list">
                <!-- Tasks will be rendered here -->
            </ul>
        </section>
    </main>

    <footer>
        <p>&copy; 2026 Your Name. TaskFlow — A transactional task management application.</p>
    </footer>
    <script src="js/app.js"></script>
</body>
</html>
